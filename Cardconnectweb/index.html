<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Alkansya</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --accent:   #00e5a0;
      --accent2:  #0077ff;
      --danger:   #ff4560;
      --warn:     #ffb347;
      --text:     #e8e8f0;
      --muted:    #555570;
      --card-bg:  #13131d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #lockScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
      gap: 0;
    }

    .lock-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .lock-logo {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0,229,160,.4);
      margin-bottom: 6px;
      position: relative;
    }

    .lock-sub {
      color: var(--muted);
      font-size: .9rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 60px;
      position: relative;
    }

    .lock-ring-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin-bottom: 36px;
    }

    .lock-ring-wrap svg {
      position: absolute;
      inset: 0;
      animation: spin 2.4s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .lock-icon-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 2.6rem;
    }

    .lock-status-text {
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      color: var(--accent);
      letter-spacing: .25em;
      text-transform: uppercase;
      animation: blink 1.8s ease-in-out infinite;
      position: relative;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    #dashboard {
      display: none;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .1em;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .85rem;
      color: var(--muted);
    }

    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--danger);
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: .08em;
      transition: all .2s;
    }
    .logout-btn:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    .main {
      padding: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .balance-card { grid-column: 1 / -1; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }

    .card-label {
      font-family: 'Space Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .balance-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .balance-amount {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(0,229,160,.3);
      line-height: 1;
    }

    .balance-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }

    .meta-chip {
      font-family: 'Space Mono', monospace;
      font-size: .68rem;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: .06em;
    }

    .chip-user {
      background: rgba(0,119,255,.15);
      color: var(--accent2);
      border: 1px solid rgba(0,119,255,.3);
    }

    .chip-uid {
      background: rgba(0,229,160,.08);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,.2);
    }

    .session-info-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .si-label {
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .si-value {
      font-family: 'Space Mono', monospace;
      font-size: .82rem;
      color: var(--text);
    }

    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .tx-list::-webkit-scrollbar { width: 4px; }
    .tx-list::-webkit-scrollbar-track { background: transparent; }
    .tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .tx-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface);
      border-radius: 10px;
      border-left: 3px solid var(--border);
      gap: 10px;
      animation: slideIn .25s ease;
    }

    @keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .tx-item.deposit  { border-left-color: var(--accent); }
    .tx-item.withdraw { border-left-color: var(--danger); }
    .tx-item.access   { border-left-color: var(--accent2); }

    .tx-type {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .tx-time {
      font-family: 'Space Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .tx-amount {
      font-family: 'Space Mono', monospace;
      font-size: .9rem;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .tx-amount.pos { color: var(--accent); }
    .tx-amount.neg { color: var(--danger); }
    .tx-amount.neu { color: var(--muted); }

    .tx-bal {
      font-family: 'Space Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      margin-top: 2px;
      text-align: right;
    }

    .session-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .session-status-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--surface);
      border-radius: 10px;
    }

    .status-icon { font-size: 1.6rem; flex-shrink: 0; }
    .status-detail { flex: 1; }
    .status-title {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }
    .status-sub {
      font-family: 'Space Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      word-break: break-all;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: .82rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: .06em;
    }

    .tx-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tx-tab {
      font-family: 'Space Mono', monospace;
      font-size: .68rem;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: .08em;
      transition: all .2s;
    }
    .tx-tab.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 700;
    }

    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
      height: 52px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; padding: 16px; gap: 14px; }
      .balance-card { grid-column: 1; }
      .session-info-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-glow"></div>
  <div class="lock-logo">SMART ALKANSYA</div>
  <div class="lock-sub">CardConnect System</div>
  <div class="lock-ring-wrap">
    <svg viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="65" cy="65" r="58" stroke="#1e1e2e" stroke-width="3"/>
      <circle cx="65" cy="65" r="58" stroke="url(#ringGrad)" stroke-width="3"
        stroke-dasharray="80 284" stroke-linecap="round"/>
      <defs>
        <linearGradient id="ringGrad" x1="0" y1="0" x2="130" y2="0">
          <stop offset="0%" stop-color="#00e5a0"/>
          <stop offset="100%" stop-color="#0077ff"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="lock-icon-center">💳</div>
  </div>
  <div class="lock-status-text" id="lockStatus">SCAN YOUR CARD</div>
  <div class="lock-status-text" id="lockScanInfo" style="margin-top:10px; font-size:.65rem; letter-spacing:.18em; color:var(--muted); animation:none;">WAITING FOR RFID</div>
</div>

<!-- RFID INPUT (hidden) -->
<input type="text" id="rfidInput" style="position:absolute;opacity:0;width:0;height:0;" autocomplete="off">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">⬡ SMART ALKANSYA</div>
    <div class="topbar-user">
      <div class="online-dot"></div>
      <span id="topbarUser">—</span>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <div class="main">
    <!-- Balance -->
    <div class="card balance-card">
      <div class="card-label">Current Balance</div>
      <div class="balance-row">
        <div class="balance-amount" id="balanceAmt">₱0.00</div>
        <div class="balance-meta">
          <div class="meta-chip chip-user" id="metaUser">—</div>
          <div class="meta-chip chip-uid" id="metaUID">—</div>
        </div>
      </div>
      <div class="session-info-row">
        <div class="si-box">
          <div class="si-label">Session Token</div>
          <div class="si-value" id="infoToken">—</div>
        </div>
        <div class="si-box">
          <div class="si-label">Session Started</div>
          <div class="si-value" id="infoTime">—</div>
        </div>
        <div class="si-box">
          <div class="si-label">Status</div>
          <div class="si-value" style="color:var(--accent)">● ACTIVE</div>
        </div>
      </div>
    </div>

    <!-- Transactions -->
    <div class="card">
      <div class="tx-tabs">
        <button class="tx-tab active" onclick="switchTab('txTab', this)">Transactions</button>
        <button class="tx-tab" onclick="switchTab('auditTab', this)">Audit Trail</button>
      </div>
      <div id="txTab">
        <div class="tx-list" id="txList">
          <div class="shimmer"></div>
          <div class="shimmer"></div>
          <div class="shimmer"></div>
        </div>
      </div>
      <div id="auditTab" style="display:none">
        <div class="tx-list" id="auditList">
          <div class="shimmer"></div>
          <div class="shimmer"></div>
        </div>
      </div>
    </div>

    <!-- Session Details -->
    <div class="card session-card">
      <div class="card-label">Session Details</div>
      <div class="session-status-box">
        <div class="status-icon">🔐</div>
        <div class="status-detail">
          <div class="status-title">Authenticated via RFID</div>
          <div class="status-sub" id="detailUID">UID: —</div>
        </div>
      </div>
      <div class="session-status-box">
        <div class="status-icon">👤</div>
        <div class="status-detail">
          <div class="status-title">Account</div>
          <div class="status-sub" id="detailUser">User: —</div>
        </div>
      </div>
      <div class="session-status-box">
        <div class="status-icon">🕐</div>
        <div class="status-detail">
          <div class="status-title">Last Updated</div>
          <div class="status-sub" id="detailTime">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyBoKkbBZwJd-AxGZHg3ENiQEr-MGqdKgKs",
    authDomain:        "cardconnect-c94ae-931d2.firebaseapp.com",
    projectId:         "cardconnect-c94ae-931d2",
    storageBucket:     "cardconnect-c94ae-931d2.firebasestorage.app",
    messagingSenderId: "546545921325",
    appId:             "1:546545921325:web:971112fae459e57244b7a4"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let unsubs = [];
  let activeUser = null;
  let rfidBuffer = '';
  let rfidTimer = null;
  let rfidBusy = false;

  function getDisplayName(userId, userData, sessionData) {
    return userData?.name || userData?.username || userData?.fullName || sessionData?.displayName || userId || 'admin';
  }

  function randomToken() {
    if (window.crypto?.randomUUID) return window.crypto.randomUUID();
    return 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
  }

  function normalizeCardValue(value) {
    return String(value || '').trim().replace(/[-\s:]/g, '').toUpperCase();
  }

  async function findUserByCardUid(cardUid) {
    const normalized = normalizeCardValue(cardUid);
    if (!normalized) return null;

    const directDoc = await db.collection('users').doc(normalized).get();
    if (directDoc.exists) return { id: directDoc.id, data: directDoc.data() };

    const usersSnap = await db.collection('users').get();
    for (const doc of usersSnap.docs) {
      const data = doc.data() || {};
      const authorizedUids = Array.isArray(data.authorizedUids) ? data.authorizedUids : [];
      if (authorizedUids.some(uid => normalizeCardValue(uid) === normalized)) {
        return { id: doc.id, data };
      }
    }

    const fields = ['uid', 'rfidUid', 'cardUid'];
    for (const field of fields) {
      const snap = await db.collection('users').where(field, '==', normalized).limit(1).get();
      if (!snap.empty) {
        const doc = snap.docs[0];
        return { id: doc.id, data: doc.data() };
      }
    }

    return null;
  }

  async function openSessionForUser(userId, userData, cardUid) {
    const sessionData = {
      user: userId,
      userId,
      displayName: getDisplayName(userId, userData),
      uid: cardUid,
      token: randomToken(),
      active: true,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    };

    await db.collection('sessions').doc(userId).set(sessionData, { merge: true });
    return sessionData;
  }

  async function deactivateSession(userId) {
    if (!userId) return;
    await db.collection('sessions').doc(userId).set({
      active: false,
      token: '',
      closedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true }).catch(() => {});
  }

  function flushRfidBuffer() {
    const captured = rfidBuffer;
    rfidBuffer = '';
    window.clearTimeout(rfidTimer);
    rfidTimer = null;
    if (captured.length >= 4) handleCardTap(captured);
  }

  function handleRfidKeydown(event) {
    if (rfidBusy) return;
    if (event.ctrlKey || event.metaKey || event.altKey) return;
    if (event.key === 'Shift' || event.key === 'CapsLock') return;

    if (event.key === 'Enter' || event.key === 'Tab') {
      if (rfidBuffer.length >= 4) flushRfidBuffer();
      return;
    }

    if (event.key.length !== 1) return;
    if (event.target && ['INPUT', 'TEXTAREA', 'SELECT'].includes(event.target.tagName)) return;

    rfidBuffer += event.key;
    window.clearTimeout(rfidTimer);
    rfidTimer = window.setTimeout(() => {
      if (rfidBuffer.length >= 4) flushRfidBuffer();
      else rfidBuffer = '';
    }, 90);
  }

  async function handleCardTap(cardUid) {
    const normalized = normalizeCardValue(cardUid);
    if (!normalized || rfidBusy) return;

    rfidBusy = true;
    const previousUser = activeUser;
    document.getElementById('lockStatus').textContent = 'READING CARD...';
    document.getElementById('lockScanInfo').textContent = 'UID: ' + normalized;

    try {
      const userMatch = await findUserByCardUid(normalized);
      if (!userMatch) {
        document.getElementById('lockScanInfo').textContent = 'NO MATCH IN FIRESTORE';
        showLock('CARD NOT REGISTERED');
        return;
      }

      if (previousUser && previousUser !== userMatch.id) {
        await deactivateSession(previousUser);
      }

      const sessionData = await openSessionForUser(userMatch.id, userMatch.data, normalized);
      document.getElementById('lockScanInfo').textContent = 'MATCHED: ' + userMatch.id;
      showDashboard(sessionData, userMatch.data);
      document.getElementById('lockStatus').textContent = 'LOGIN SUCCESS';
    } catch (error) {
      console.error('RFID login failed:', error);
      document.getElementById('lockScanInfo').textContent = 'LOGIN ERROR';
      showLock('LOGIN FAILED');
    } finally {
      rfidBusy = false;
    }
  }

  function fmt(ts) {
    if (!ts) return '—';
    let d = ts?.toDate ? ts.toDate() : new Date(typeof ts === 'number' ? ts : ts);
    if (isNaN(d)) return '—';
    return d.toLocaleString('en-PH', { month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function shortToken(t) {
    if (!t) return '—';
    return t.substring(0, 8) + '…';
  }

  function showDashboard(sessionData, userData) {
    activeUser = sessionData.userId || sessionData.user || activeUser || 'admin';
    const displayName = getDisplayName(activeUser, userData, sessionData);
    document.getElementById('topbarUser').textContent = displayName;
    document.getElementById('balanceAmt').textContent = '₱' + Number(userData?.balance || 0).toFixed(2);
    document.getElementById('metaUser').textContent = displayName;
    document.getElementById('metaUID').textContent = sessionData.uid || '—';
    document.getElementById('infoToken').textContent = shortToken(sessionData.token);
    document.getElementById('infoTime').textContent = fmt(sessionData.timestamp);
    document.getElementById('detailUID').textContent = 'UID: ' + (sessionData.uid || '—');
    document.getElementById('detailUser').textContent = 'User: ' + displayName;
    document.getElementById('detailTime').textContent = fmt(sessionData.timestamp);
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    startListeners(activeUser);
  }

  function showLock(msg) {
    unsubs.forEach(fn => fn && fn());
    unsubs = [];
    activeUser = null;
    document.getElementById('lockScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('lockStatus').textContent = msg || 'SCAN YOUR CARD';
    document.getElementById('lockScanInfo').textContent = 'WAITING FOR RFID';
  }

  function startListeners(userId) {
    unsubs.forEach(fn => fn && fn());
    unsubs = [];

    const u1 = db.collection('users').doc(userId).onSnapshot(doc => {
      if (!doc.exists) return;
      const d = doc.data();
      if (d.balance !== undefined)
        document.getElementById('balanceAmt').textContent = '₱' + Number(d.balance).toFixed(2);
    });

    const u2 = db.collection('transactions')
      .orderBy('timestamp', 'desc').limit(25)
      .onSnapshot(snap => {
        const list = document.getElementById('txList');
        if (snap.empty) { list.innerHTML = '<div class="empty-state">NO TRANSACTIONS YET</div>'; return; }
        list.innerHTML = snap.docs.map(doc => {
          const d = doc.data();
          const type = (d.type || 'access').toLowerCase();
          const isD = type === 'deposit', isW = type === 'withdraw';
          const cls = isD ? 'pos' : isW ? 'neg' : 'neu';
          const pre = isD ? '+' : isW ? '-' : '';
          const amt = Math.abs(d.amount || 0).toFixed(2);
          const bal = d.balanceAfter !== undefined ? `<div class="tx-bal">Bal: ₱${Number(d.balanceAfter).toFixed(2)}</div>` : '';
          return `<div class="tx-item ${type}">
            <div><div class="tx-type">${d.type || 'Access'}</div><div class="tx-time">${fmt(d.timestamp)}</div></div>
            <div><div class="tx-amount ${cls}">${pre}₱${amt}</div>${bal}</div>
          </div>`;
        }).join('');
      });

    const u3 = db.collection('sessions').onSnapshot(snap => {
      const list = document.getElementById('auditList');
      if (snap.empty) { list.innerHTML = '<div class="empty-state">NO AUDIT ENTRIES</div>'; return; }
      const entries = [];
      snap.forEach(doc => entries.push({ ...doc.data(), docId: doc.id }));
      entries.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      list.innerHTML = entries.map(d => `
        <div class="tx-item ${d.active ? 'deposit' : 'access'}">
          <div>
            <div class="tx-type">${d.active ? '🔓 SESSION OPEN' : '🔒 SESSION CLOSED'} — ${d.user || d.docId}</div>
            <div class="tx-time">UID: ${d.uid || '—'} | Token: ${shortToken(d.token)}</div>
            <div class="tx-time">${fmt(d.timestamp)}</div>
          </div>
        </div>`).join('');
    });

    unsubs = [u1, u2, u3];
  }

  function switchTab(id, btn) {
    document.getElementById('txTab').style.display   = id === 'txTab'    ? 'block' : 'none';
    document.getElementById('auditTab').style.display = id === 'auditTab' ? 'block' : 'none';
    document.querySelectorAll('.tx-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function doLogout() {
    if (!activeUser) { showLock('SCAN YOUR CARD'); return; }
    db.collection('sessions').doc(activeUser).update({ active: false, token: '' })
      .catch(() => {}).finally(() => showLock('SESSION CLOSED'));
  }

  function watchSession() {
    db.collection('sessions').onSnapshot(snap => {
      const anyActive = snap.docs.some(d => d.data().active === true);

      snap.forEach(async doc => {
        const d = doc.data();
        const userId = d.userId || d.user || doc.id;
        if (d.active && d.token) {
          let userData = {};
          try {
            const uDoc = await db.collection('users').doc(userId).get();
            if (uDoc.exists) userData = uDoc.data();
          } catch(e) {}
          if (!activeUser) showDashboard({ ...d, userId }, userData);
          else if (activeUser === userId) document.getElementById('balanceAmt').textContent = '₱' + Number(userData?.balance || 0).toFixed(2);
        } else if (d.active === false && activeUser === userId) {
          showLock('SESSION ENDED — SCAN AGAIN');
        }
      });

      if (!anyActive && activeUser) showLock('NO ACTIVE SESSION');
    });
  }

  window.addEventListener('keydown', handleRfidKeydown, true);

  watchSession();
</script>
</body>
</html>
